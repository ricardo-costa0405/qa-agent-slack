version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: qa-agent-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-qaagent2025}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - OLLAMA_HOST=host.docker.internal:11434
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - EXECUTIONS_MODE=regular
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qa-agent-network

networks:
  qa-agent-network:
    driver: bridge

volumes:
  n8n_data: